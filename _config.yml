theme:
title: Welcome to Pt!
description: Personal Homepage and Posts
icon: /assets/images/icon-rick.png

show_downloads: false
google_analytics: G-W9EF2VS3C2


# defaults:
#   -
#     scope:
#       path: ""
#     values:
#       layout: "post"
#       tag: "blog"

plugins:
  - jemoji

collections:
  moods:
    output: true
  mems:
    output: true

defaults:
  -
    scope:
      path: "collections/_posts"
    values:
      layout: post
  -
    scope:
      path: "collections/_moods"
    values:
      layout: post
      title: 日记
  -
    scope:
      path: "collections/_mems"
    values:
      layout: post

collections_dir: collections